name = "prepaired-api"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Worker runs on the free plan — no CPU time issues for this workload.
# Production API custom domain: https://api.prepaired.ijneb.dev

[[kv_namespaces]]
binding = "CREDITS"
id = "124d3348136b48baa52ae2f44c366b90"

# Secrets — set via CLI, never commit to git:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put WHOP_WEBHOOK_SECRET
#   wrangler secret put SESSION_SECRET
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put FROM_EMAIL
#   wrangler secret put ADMIN_SECRET
#
# To generate SESSION_SECRET locally:
#   node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"

[env.production]
name = "prepaired-api"
routes = [
  { pattern = "api.prepaired.ijneb.dev", custom_domain = true }
]

[[env.production.kv_namespaces]]
binding = "CREDITS"
id = "124d3348136b48baa52ae2f44c366b90"
